<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>무릎팍도사 — Global AI Saju Fortune</title>
  <meta name="description" content="AI가 당신의 사주를 읽어드립니다. LINE, KakaoTalk, 그 어디서든.">
  <style>
    :root {
      --green: #06C755;
      --dark: #1A1A2E;
      --purple: #7C5CBF;
      --white: #FFFFFF;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: -apple-system, 'Noto Sans KR', sans-serif; background: var(--dark); color: var(--white); }
    .hero {
      min-height: 100vh;
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      text-align: center; padding: 2rem;
      background: linear-gradient(135deg, var(--dark) 0%, #2D1B69 100%);
    }
    .badge { background: var(--green); color: #000; font-size: 0.75rem; font-weight: 700;
      padding: 4px 12px; border-radius: 20px; margin-bottom: 1.5rem; display: inline-block; }
    h1 { font-size: clamp(2rem, 6vw, 4rem); font-weight: 900; margin-bottom: 1rem;
      background: linear-gradient(135deg, #fff 0%, var(--green) 100%);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .subtitle { font-size: 1.1rem; color: rgba(255,255,255,0.7); margin-bottom: 3rem; line-height: 1.6; }
    .markets { display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center; margin-bottom: 3rem; }
    .market-card {
      background: rgba(255,255,255,0.08); border: 1px solid rgba(255,255,255,0.15);
      border-radius: 12px; padding: 1.5rem; min-width: 160px; text-align: center;
      transition: transform 0.2s, border-color 0.2s;
    }
    .market-card:hover { transform: translateY(-4px); border-color: var(--green); }
    .market-card .flag { font-size: 2rem; margin-bottom: 0.5rem; }
    .market-card .name { font-weight: 700; margin-bottom: 0.25rem; }
    .market-card .status { font-size: 0.75rem; color: rgba(255,255,255,0.5); }
    .market-card.active .status { color: var(--green); }
    .cta { background: var(--green); color: #000; font-weight: 700; font-size: 1rem;
      padding: 14px 32px; border-radius: 50px; text-decoration: none; display: inline-block;
      transition: transform 0.2s; }
    .cta:hover { transform: scale(1.05); }
    footer { text-align: center; padding: 2rem; color: rgba(255,255,255,0.3); font-size: 0.8rem; }
  </style>
</head>
<body>
  <section class="hero">
    <span class="badge">G2 Company Ltd Official</span>
    <h1>무릎팍도사</h1>
    <p class="subtitle">
      AI가 당신의 사주를 읽어드립니다<br>
      LINE, KakaoTalk, 그 어디서든 — 3초 안에
    </p>
    <div class="markets">
      <div class="market-card active">
        <div class="flag">🇯🇵</div>
        <div class="name">命星AI</div>
        <div class="status">● Phase 1 — Coming Soon</div>
      </div>
      <div class="market-card">
        <div class="flag">🇰🇷</div>
        <div class="name">무릎팍도사</div>
        <div class="status">Phase 2 — 준비 중</div>
      </div>
      <div class="market-card">
        <div class="flag">🌏</div>
        <div class="name">SE Asia</div>
        <div class="status">Phase 3 — 예정</div>
      </div>
      <div class="market-card">
        <div class="flag">🌎</div>
        <div class="name">Global</div>
        <div class="status">Phase 4 — 예정</div>
      </div>
    </div>
    <a href="https://github.com/kgg2512/mureupak-dosa" class="cta">GitHub에서 보기</a>
  </section>
  <footer>© 2026 G2 Company Ltd. All rights reserved.</footer>
</body>
</html>
