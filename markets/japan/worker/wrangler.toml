# markets/japan/worker/wrangler.toml
# 命星AI — Japan CF Workers 설정
#
# 필수 사전 작업:
#   1. `wrangler login` — CF 계정 인증
#   2. KV 네임스페이스 생성: `wrangler kv:namespace create SAJU_JAPAN_KV`
#      → 생성된 id를 아래 kv_namespaces[].id에 입력
#   3. Secrets 등록:
#      wrangler secret put LINE_CHANNEL_SECRET
#      wrangler secret put LINE_CHANNEL_ACCESS_TOKEN
#      wrangler secret put OPENAI_API_KEY
#      wrangler secret put STRIPE_SECRET_KEY
#
# 배포:
#   wrangler deploy

name = "meisei-ai-japan"
main = "index.js"
compatibility_date = "2024-01-01"
compatibility_flags = ["nodejs_compat"]

# CF Workers 무료 플랜: 100K req/일
# 유료 전환 시 Workers Paid ($5/월) 검토

# ── 환경 변수 (비밀 아닌 공개 설정) ──────────
[vars]
MARKET = "japan"
SERVICE_NAME = "命星AI"
LIFF_URL = "https://liff.line.me/REPLACE_WITH_LIFF_ID"
# 위 LIFF_URL은 LINE Developers Console에서 LIFF 앱 등록 후 업데이트

# ── KV 네임스페이스 (결제 상태 임시 저장 TTL 1h) ──────────
# 생성 명령: wrangler kv:namespace create SAJU_JAPAN_KV
# 생성 후 id를 아래에 입력
[[kv_namespaces]]
binding = "KV"
id = "REPLACE_WITH_KV_NAMESPACE_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# ── 라우팅 ──────────────────────────────────
# CF Workers URL: https://meisei-ai-japan.{CF_ACCOUNT}.workers.dev
# 커스텀 도메인: 추후 설정 가능

# ── 로그 (개발용) ──────────────────────────
[dev]
port = 8787
local_protocol = "http"

# ── 배포 설정 ─────────────────────────────
[build]
command = ""

# ── 비밀 키 목록 (실제 값은 wrangler secret put으로만 등록) ──
# LINE_CHANNEL_SECRET      — LINE Webhook 서명 검증
# LINE_CHANNEL_ACCESS_TOKEN — LINE 메시지 발송
# OPENAI_API_KEY           — GPT-4o mini 호출
# STRIPE_SECRET_KEY        — Stripe 결제 처리
#
# ⚠️ 위 키들을 절대 이 파일이나 코드에 하드코딩하지 말 것
